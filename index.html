<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HOVE OPS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B2559;--navy-h:#0D2E6E;--navy-pale:#EEF2FA;
  --bg:#F7F9FC;--white:#FFFFFF;--border:#E4E9F2;
  --text:#0A0F1E;--t2:#5A6480;--t3:#9AA3BA;
  --amber:#F59E0B;--red:#EF4444;--green:#10B981;
  --red-p:#FEF2F2;--amber-p:#FFFBEB;--green-p:#ECFDF5;
  --r:14px;--shadow:0 1px 3px rgba(11,37,89,.06),0 4px 16px rgba(11,37,89,.05)
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{display:flex;min-height:100vh}

/* SIDEBAR */
#sidebar{width:220px;min-height:100vh;background:var(--white);border-right:1px solid var(--border);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:50}
.s-logo{padding:24px 20px 14px;border-bottom:1px solid var(--border)}
.s-wordmark{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--navy);letter-spacing:-.5px}
.s-sub{font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.s-meta{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#utc{font-family:'Courier New',monospace;font-size:13px;font-weight:600;color:var(--navy)}
#dot{width:8px;height:8px;border-radius:50%;background:var(--green);transition:background .3s}
#dot.err{background:var(--red)}
nav{padding:12px;flex:1}
.nb{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--t2);font-size:14px;font-weight:400;font-family:'DM Sans',sans-serif;text-align:left;margin-bottom:2px;transition:all .15s}
.nb:hover{background:var(--bg);color:var(--navy)}
.nb.on{background:var(--navy-pale);color:var(--navy);font-weight:600}
.nb-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;font-weight:700;display:none}
.s-foot{padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--t3)}

/* MAIN */
#content{margin-left:220px;flex:1;padding:36px 32px 60px;min-width:0}

/* BOTTOM NAV */
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:100;padding:8px 0 12px}
.bnb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;color:var(--t3);cursor:pointer;padding:4px 0;font-size:10px;font-family:'DM Sans',sans-serif}
.bnb.on{color:var(--navy);font-weight:600}

/* TYPOGRAPHY */
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--navy)}
.pg-sub{font-size:14px;color:var(--t2);margin-top:4px}
.sec-label{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;display:block}

/* CARD */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}

/* BUTTONS */
.btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--navy-h)}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-g:hover{border-color:var(--navy);color:var(--navy)}
.btn-d{background:transparent;color:var(--red);border:1px solid var(--red);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-sm{padding:5px 12px;font-size:13px}

/* BADGE */
.badge{display:inline-block;border-radius:6px;padding:3px 8px;font-size:12px;font-weight:600}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--navy-pale);padding:4px;border-radius:10px;width:fit-content;margin-bottom:24px}
.tab{padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--t2);transition:all .15s}
.tab.on{background:var(--navy);color:#fff}

/* FORMS */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:14px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy)}
.field textarea{min-height:80px;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(10,15,30,.5);z-index:1000;align-items:center;justify-content:center;padding:16px}
#overlay.open{display:flex}
#modal{background:var(--white);border-radius:var(--r);border:1px solid var(--border);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow)}
.m-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.m-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--navy)}
.m-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--t2);line-height:1}
.m-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px}
.stat{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:18px 16px;box-shadow:var(--shadow)}
.stat-v{font-family:'Syne',sans-serif;font-size:32px;font-weight:800}
.stat-l{font-size:12px;color:var(--t2);margin-top:4px}

/* LIST ITEMS */
.li{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:16px 20px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.li-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--navy);margin-bottom:4px}
.li-sub{font-size:13px;color:var(--t2)}
.li-actions{display:flex;gap:8px;align-items:center}

/* ALERTS */
.alert-li{padding:12px 16px;background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.alert-li.red{border-left:3px solid var(--red)}
.alert-li.amber{border-left:3px solid var(--amber)}
.alert-li.navy{border-left:3px solid var(--navy)}

/* CREW */
.crew-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.crew-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.crew-div{border-top:1px solid var(--border);padding-top:14px}
.lic-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:10px}
.lic{border-radius:10px;padding:10px 12px}
.lic-n{font-weight:700;font-size:14px}
.lic-d{font-size:12px;color:var(--t2);margin-top:2px}
.lic-s{font-size:11px;font-weight:600;margin-top:2px}
.lic-a{display:flex;gap:6px;margin-top:8px}
.lic-btn{font-size:11px;background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.1);border-radius:5px;padding:2px 8px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* SIGN */
.sign-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.sign-chip{border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px}
.sign-btn{font-size:11px;background:var(--navy);color:#fff;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* MISC */
.empty{text-align:center;padding:48px 20px;color:var(--t3);font-size:14px}
.spinner-w{display:flex;justify-content:center;padding:60px}
.spinner{width:32px;height:32px;border:3px solid var(--navy-pale);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{display:none}
  #bnav{display:flex}
  #content{margin-left:0;padding:20px 16px 90px}
  h1{font-size:22px}
  .g2{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr)}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* OFP MODULE */
.ofp-stepper{display:flex;align-items:center;gap:0;margin-bottom:32px}
.ofp-step{display:flex;align-items:center;gap:10px;flex:1}
.ofp-step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;transition:all .2s}
.ofp-step-num.done{background:var(--green);color:#fff}
.ofp-step-num.active{background:var(--navy);color:#fff;box-shadow:0 0 0 4px var(--navy-pale)}
.ofp-step-num.idle{background:var(--border);color:var(--t2)}
.ofp-step-label{font-size:13px;font-weight:600;color:var(--t2)}
.ofp-step-label.active{color:var(--navy)}
.ofp-step-label.done{color:var(--green)}
.ofp-step-line{flex:1;height:2px;background:var(--border);margin:0 8px;border-radius:2px;transition:background .3s}
.ofp-step-line.done{background:var(--green)}
.ofp-panel{display:none}
.ofp-panel.active{display:block}
#ofp-map{height:340px;border-radius:var(--r);border:1px solid var(--border);margin-top:12px;z-index:1}
.ofp-mass-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ofp-result-box{background:var(--navy-pale);border-radius:10px;padding:16px;margin-top:16px}
.ofp-result-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}
.ofp-result-row:last-child{border-bottom:none}
.ofp-result-val{font-weight:700;font-size:15px;color:var(--navy)}
.ofp-alert-weight{background:#FEF2F2;border:2px solid var(--red);border-radius:10px;padding:12px 16px;margin-top:12px;font-weight:700;color:var(--red);display:none}
.ofp-released{background:var(--green-p);border:2px solid var(--green);border-radius:10px;padding:16px;text-align:center;margin-top:16px;display:none}
.ofp-history-item{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:14px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;box-shadow:var(--shadow)}
.ofp-status-badge{border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700}
.ofp-status-badge.released{background:var(--green-p);color:var(--green)}
.ofp-status-badge.draft{background:var(--navy-pale);color:var(--navy)}
.route-input{font-family:'Courier New',monospace;font-size:14px;letter-spacing:.5px;text-transform:uppercase}
.ofp-hist-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.ofp-hist-head{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;flex-wrap:wrap;gap:10px}
.ofp-hist-head:hover{background:var(--navy-pale)}
.ofp-hist-body{display:none;border-top:1px solid var(--border);padding:16px 20px;background:var(--bg)}
.ofp-hist-body.open{display:block}
.ofp-data-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.ofp-data-cell{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.ofp-data-label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ofp-data-val{font-size:14px;font-weight:700;color:var(--navy)}
.ofp-metar-block{background:#1a1a2e;border-radius:8px;padding:12px;font-family:'Courier New',monospace;font-size:11px;color:#a8d8a8;white-space:pre-wrap;margin-bottom:10px;max-height:120px;overflow-y:auto}

/* CALENDAR */
.cal-month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month-title{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;color:var(--navy)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.cal-dow{background:var(--navy-pale);text-align:center;padding:8px 4px;font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.cal-cell{background:var(--white);min-height:80px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;vertical-align:top}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--navy-pale)}
.cal-cell.other{background:#FAFBFD}
.cal-cell.other .cal-day-num{color:var(--t3)}
.cal-cell.today .cal-day-num{background:var(--navy);color:#fff;border-radius:50%}
.cal-cell.selected{background:#E8EFF9}
.cal-day-num{font-size:13px;font-weight:600;color:var(--navy);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.cal-pills{display:flex;flex-direction:column;gap:2px}
.cal-pill{border-radius:4px;padding:2px 5px;font-size:10px;font-weight:600;display:flex;align-items:center;gap:3px;overflow:hidden;white-space:nowrap;max-width:100%}
.cal-pill span{overflow:hidden;text-overflow:ellipsis}
.cal-pill.vol{background:#DBEAFE;color:#1E40AF}
.cal-pill.sim{background:#EDE9FE;color:#5B21B6}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cal-dot.vol{background:#2563EB}
.cal-dot.sim{background:#7C3AED}
.cal-dots{display:flex;gap:3px;margin-top:3px}
.cal-legend{display:flex;gap:16px;margin-bottom:16px}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t2)}
.cal-legend-dot{width:10px;height:10px;border-radius:50%}
.cal-day-detail{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.cal-day-detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.cal-event{border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-left:4px solid transparent}
.cal-event.vol{background:#EFF6FF;border-left-color:#2563EB}
.cal-event.sim{background:#F5F3FF;border-left-color:#7C3AED}
.cal-event-kind{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.cal-event-kind.vol{color:#2563EB}
.cal-event-kind.sim{color:#7C3AED}
.cal-event-title{font-family:"Syne",sans-serif;font-weight:700;font-size:16px;color:var(--navy);margin-bottom:3px}
.cal-event-sub{font-size:13px;color:var(--t2);margin-top:2px}
.cal-event-time{font-weight:700;font-size:15px;color:var(--navy);text-align:right;white-space:nowrap}
.cal-event-time-sub{font-size:12px;color:var(--t2);text-align:right;margin-top:2px}
@media(max-width:768px){.cal-cell{min-height:50px;padding:4px}.cal-pills{display:none}.cal-dots{display:flex}}
@media(min-width:769px){.cal-dots{display:none}}
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="s-logo">
      <div class="s-wordmark">HOVE OPS</div>
      <div class="s-sub">Operations</div>
    </div>
    <div class="s-meta">
      <span id="utc">--:-- UTC</span>
      <span id="dot"></span>
    </div>
    <nav id="snav"></nav>
    <div class="s-foot">v2.0 · HOVE Aviation</div>
  </aside>

  <!-- CONTENT -->
  <main id="content">
    <div class="spinner-w"><div class="spinner"></div></div>
  </main>

  <!-- BOTTOM NAV -->
  <nav id="bnav"></nav>
</div>

<!-- MODAL -->
<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="m-head">
      <span class="m-title" id="m-title"></span>
      <button class="m-close" onclick="closeModal()">×</button>
    </div>
    <div id="m-body"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   CONFIG SUPABASE
═══════════════════════════════════════════ */
const SB = 'https://rjwtzwoojfsvpdopmocv.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqd3R6d29vamZzdnBkb3Btb2N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDk3NzAsImV4cCI6MjA5MDg4NTc3MH0.pr2pCDA57woTwl0EkP41jUHwmuDfgyUfa046HF3yg1E';
const H = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

const db = {
  get: (t, q='') => fetch(`${SB}/rest/v1/${t}?${q}`, {headers: H}).then(r => r.json()),
  post: (t, d) => fetch(`${SB}/rest/v1/${t}`, {method:'POST', headers: H, body: JSON.stringify(d)}).then(r => r.json()),
  patch: (t, id, d) => fetch(`${SB}/rest/v1/${t}?id=eq.${id}`, {method:'PATCH', headers: H, body: JSON.stringify(d)}).then(r => r.json()),
  del: (t, id) => fetch(`${SB}/rest/v1/${t}?id=eq.${id}`, {method:'DELETE', headers: H}),
};

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const S = {
  page: 'dashboard',
  pilots: [], aircraft: [], flights: [], sims: [], licenses: [],
  derogations: [], manex: [], signatures: [],
  loading: true, synced: false,
  planDate: todayStr(), planTab: 'vols', compTab: 'derog', formTab: 'fr',
  forms: [],
  ofpStep: 1, ofpData: {}, ofpMap: null, ofpTab: 'new',
};

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'});
}
function fmtTime(dt) {
  if (!dt) return '—';
  return new Date(dt).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}
function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}
function alertColor(days) {
  if (days === null) return 'var(--t3)';
  if (days < 0) return 'var(--red)';
  if (days < 30) return 'var(--amber)';
  return 'var(--green)';
}
function alertBg(days) {
  if (days === null) return '#F3F4F6';
  if (days < 0) return 'var(--red-p)';
  if (days < 30) return 'var(--amber-p)';
  return 'var(--green-p)';
}
function pilotName(id) {
  const p = S.pilots.find(p => p.id === id);
  return p ? `${p.first_name} ${p.last_name}` : '—';
}
function aircraftName(id) {
  const a = S.aircraft.find(a => a.id === id);
  return a ? a.name : '—';
}
function licLabel(t) {
  return {MEP:'MEP', SEP:'SEP', IRME:'IR/ME', CRM:'CRM', CLASSE_1:'Classe 1'}[t] || t;
}
function alertCount() {
  return S.licenses.filter(l => { const d = daysUntil(l.expiry_date); return d !== null && d < 30; }).length;
}
function safe(arr) { return Array.isArray(arr) ? arr : []; }
function first(res) { const a = safe(res); return a[0] || null; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ═══════════════════════════════════════════
   UTC CLOCK
═══════════════════════════════════════════ */
function tickClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const el = document.getElementById('utc');
  if (el) el.textContent = `${h}:${m} UTC`;
}
setInterval(tickClock, 1000);
tickClock();

   NAV CONFIG
═══════════════════════════════════════════ */
const PAGES = [
  { id: 'dashboard', label: 'Dashboard', icon: iconGrid() },
  { id: 'planning',  label: 'Planning',  icon: iconCal() },
  { id: 'flotte',   label: 'Flotte',    icon: iconPlane() },
  { id: 'crew',     label: 'Crew',      icon: iconUsers() },
  { id: 'compliance',label: 'Compliance',icon: iconShield() },
  { id: 'formulaires',label: 'Formulaires',icon: iconDoc() },
  { id: 'ofp',        label: 'OFP',         icon: iconOFP() },
];

function buildNav() {
  const snav = document.getElementById('snav');
  const bnav = document.getElementById('bnav');
  const cnt = alertCount();

  snav.innerHTML = PAGES.map(p => `
    <button class="nb ${S.page===p.id?'on':''}" onclick="goTo('${p.id}')">
      ${p.icon} ${esc(p.label)}
      ${p.id==='dashboard' && cnt>0 ? `<span class="nb-badge" style="display:inline">${cnt}</span>` : ''}
    </button>`).join('');

  bnav.innerHTML = PAGES.map(p => `
    <button class="bnb ${S.page===p.id?'on':''}" onclick="goTo('${p.id}')">
      ${p.icon} ${esc(p.label)}
    </button>`).join('');

  const dot = document.getElementById('dot');
  if (dot) { dot.className = S.synced ? '' : 'err'; }
}

/* ═══════════════════════════════════════════
   ROUTING
═══════════════════════════════════════════ */
function goTo(page) {
  S.page = page;
  buildNav();
  renderPage();
}

function renderPage() {
  const c = document.getElementById('content');
  if (S.loading) { c.innerHTML = '<div class="spinner-w"><div class="spinner"></div></div>'; return; }
  const r = {
    dashboard: renderDashboard,
    planning: renderPlanning,
    flotte: renderFlotte,
    crew: renderCrew,
    compliance: renderCompliance,
    formulaires: renderFormulaires,
    ofp: renderOFP,
  };
  (r[S.page] || renderDashboard)();
}

/* ═══════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════ */
async function loadAll() {
  S.loading = true;
  renderPage();
  try {
    const [p,a,f,ss,l,d,m,sg,fo] = await Promise.all([
      db.get('pilots','order=created_at.asc'),
      db.get('aircraft','order=created_at.asc'),
      db.get('flights','order=departure_time.desc'),
      db.get('simulator_sessions','order=date.desc,start_time.desc'),
      db.get('licenses','order=expiry_date.asc'),
      db.get('ifr_derogations','order=signed_at.desc'),
      db.get('manex_documents','order=created_at.desc'),
      db.get('manex_signatures','order=signed_at.desc'),
      db.get('hove_forms','order=submitted_at.desc').catch(()=>[]),
    ]);
    S.pilots=safe(p); S.aircraft=safe(a); S.flights=safe(f); S.sims=safe(ss);
    S.licenses=safe(l); S.derogations=safe(d); S.manex=safe(m); S.signatures=safe(sg); S.forms=safe(fo);
    S.synced = true;
  } catch(e) { S.synced = false; }
  S.loading = false;
  buildNav();
  renderPage();
}

/* ═══════════════════════════════════════════
   PAGE: PLANNING — CALENDAR VIEW
═══════════════════════════════════════════ */
function renderPlanning() {
  const c = document.getElementById('content');
  const today = todayStr();

  // Build calendar for selected month
  const [selY, selM] = S.planDate.split('-').map(Number);
  const firstDay = new Date(selY, selM - 1, 1);
  const lastDay = new Date(selY, selM, 0);
  // Monday-first: 0=Mon..6=Sun
  let startDow = (firstDay.getDay() + 6) % 7;
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DOWS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  function eventsByDate(dateStr) {
    const vols = S.flights.filter(f => f.departure_time?.startsWith(dateStr));
    const sims = S.sims.filter(s => s.date === dateStr);
    return { vols, sims };
  }

  function cellHTML(dateStr, isOther) {
    const { vols, sims } = eventsByDate(dateStr);
    const dayNum = parseInt(dateStr.split('-')[2]);
    const isToday = dateStr === today;
    const isSelected = dateStr === S.planDate;
    let cls = 'cal-cell';
    if (isOther) cls += ' other';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    const pills = [
      ...vols.map(f => `<div class="cal-pill vol"><span class="cal-dot vol"></span><span>${esc(f.departure||'')}→${esc(f.arrival||'')}</span></div>`),
      ...sims.map(s => `<div class="cal-pill sim"><span class="cal-dot sim"></span><span>${esc(s.client_name||'Sim')}</span></div>`)
    ].join('');
    const dots = [
      ...vols.map(() => '<span class="cal-dot vol"></span>'),
      ...sims.map(() => '<span class="cal-dot sim"></span>')
    ].join('');
    return `<div class="${cls}" onclick="S.planDate='${dateStr}';renderPlanning()">
      <div class="cal-day-num">${dayNum}</div>
      <div class="cal-pills">${pills}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }

  let calCells = DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < totalCells; i++) {
    const offset = i - startDow;
    const cellDate = new Date(selY, selM - 1, 1 + offset);
    const dateStr = `${cellDate.getFullYear()}-${String(cellDate.getMonth()+1).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`;
    const isOther = cellDate.getMonth() !== selM - 1;
    calCells += cellHTML(dateStr, isOther);
  }

  // Day detail
  const { vols: dayFlights, sims: daySims } = eventsByDate(S.planDate);
  const [sdY, sdM, sdD] = S.planDate.split('-').map(Number);
  const selDateLabel = new Date(sdY, sdM - 1, sdD).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

  const allEvents = [
    ...dayFlights.map(f => ({type:'vol', obj:f})),
    ...daySims.map(s => ({type:'sim', obj:s}))
  ].sort((a,b) => {
    const ta = a.type==='vol' ? a.obj.departure_time||'' : (S.planDate+'T'+(a.obj.start_time||''));
    const tb = b.type==='vol' ? b.obj.departure_time||'' : (S.planDate+'T'+(b.obj.start_time||''));
    return ta.localeCompare(tb);
  });

  const eventsHTML = allEvents.length === 0
    ? `<div class="empty" style="padding:28px 20px">Aucun événement ce jour</div>`
    : allEvents.map(({type, obj}) => {
        if (type === 'vol') {
          return `<div class="cal-event vol">
            <div style="min-width:0">
              <div class="cal-event-kind vol">Vol</div>
              <div class="cal-event-title">${esc(obj.departure||'?')} → ${esc(obj.arrival||'?')}</div>
              <div class="cal-event-sub">${esc(aircraftName(obj.aircraft_id))} · ${esc(pilotName(obj.pilot_id))}</div>
              ${obj.flight_type ? `<div class="cal-event-sub">${esc(obj.flight_type)}</div>` : ''}
              ${obj.notes ? `<div class="cal-event-sub" style="color:var(--t3)">${esc(obj.notes)}</div>` : ''}
            </div>
            <div style="flex-shrink:0">
              <div class="cal-event-time">${fmtTime(obj.departure_time)}</div>
              <div class="cal-event-time-sub">→ ${fmtTime(obj.arrival_time)}</div>
              <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
                <button class="btn-g btn-sm" onclick="openEditVol('${obj.id}')">Modifier</button>
                <button class="btn-d" onclick="deleteVol('${obj.id}')">Supprimer</button>
              </div>
            </div>
          </div>`;
        } else {
          return `<div class="cal-event sim">
            <div style="min-width:0">
              <div class="cal-event-kind sim">Simulateur</div>
              <div class="cal-event-title">${esc(obj.client_name||'—')}</div>
              <div class="cal-event-sub">${esc(obj.session_type||'')}${obj.client_origin?' · '+esc(obj.client_origin):''}</div>
              <div class="cal-event-sub">Responsable : ${esc(pilotName(obj.handler_id))}</div>
              ${obj.notes ? `<div class="cal-event-sub" style="color:var(--t3)">${esc(obj.notes)}</div>` : ''}
            </div>
            <div style="flex-shrink:0">
              <div class="cal-event-time">${(obj.start_time||'').slice(0,5)} – ${(obj.end_time||'').slice(0,5)}</div>
              ${obj.amount ? `<div class="cal-event-time-sub">${obj.amount} €</div>` : ''}
              <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
                <button class="btn-g btn-sm" onclick="openEditSim('${obj.id}')">Modifier</button>
                <button class="btn-d" onclick="deleteSim('${obj.id}')">Supprimer</button>
              </div>
            </div>
          </div>`;
        }
      }).join('');

  c.innerHTML = `
    <div class="ph" style="margin-bottom:20px">
      <h1>Planning</h1>
      <div class="row">
        <button class="btn" onclick="S.planDate=todayStr();renderPlanning()">Aujourd'hui</button>
      </div>
    </div>

    <div class="cal-month-header">
      <div class="cal-month-title">${MONTHS[selM-1]} ${selY}</div>
      <div class="row">
        <button class="btn-g" onclick="changeMonth(-1)">‹</button>
        <button class="btn-g" onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#2563EB"></div>Vol</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#7C3AED"></div>Simulateur</div>
    </div>

    <div class="cal-grid">${calCells}</div>

    <div class="cal-day-detail">
      <div class="cal-day-detail-head">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--navy)">${cap(selDateLabel)}</div>
        <div class="row">
          <button class="btn-g btn-sm" onclick="openNewVol()">+ Vol</button>
          <button class="btn" onclick="openNewSim()" style="background:#7C3AED">+ Sim</button>
        </div>
      </div>
      ${eventsHTML}
    </div>
  `;
}

function changeMonth(delta) {
  const [y, m] = S.planDate.split('-').map(Number);
  const newDate = new Date(y, m - 1 + delta, 1);
  S.planDate = `${newDate.getFullYear()}-${String(newDate.getMonth()+1).padStart(2,'0')}-01`;
  renderPlanning();
}

function openNewVol() { openModal('Nouveau vol', volForm()); }
function openEditVol(id) { const v = S.flights.find(f => f.id===id); if(v) openModal('Modifier le vol', volForm(v)); }

async function saveVol(id) {
  const d = { aircraft_id: val('f-ac'), pilot_id: val('f-pi'), flight_type: val('f-ty'), departure: val('f-dep'), arrival: val('f-arr'), departure_time: val('f-dt'), arrival_time: val('f-at'), notes: val('f-no') };
  if (!d.aircraft_id||!d.pilot_id||!d.departure||!d.arrival||!d.departure_time||!d.arrival_time) return alert('Champs obligatoires manquants');
  if (id) {
    const r = await db.patch('flights', id, d);
    const u = first(r)||{...S.flights.find(f=>f.id===id),...d};
    S.flights = S.flights.map(f => f.id===id ? u : f);
  } else {
    const r = await db.post('flights', d);
    const n = first(r); if(n) S.flights.unshift(n);
  }
  closeModal(); renderPlanning();
}

async function deleteVol(id) {
  if (!confirm('Supprimer ce vol ?')) return;
  await db.del('flights', id);
  S.flights = S.flights.filter(f => f.id !== id);
  renderPlanning();
}

async function saveSim(id) {
  const sim = S.aircraft.find(a => a.type==='simulator');
  const d = { date: val('s-da'), start_time: val('s-st'), end_time: val('s-et'), client_name: val('s-cn'), client_origin: val('s-co'), session_type: val('s-ty'), amount: val('s-am') ? parseFloat(val('s-am')) : null, handler_id: val('s-ha') || null, notes: val('s-no'), simulator_id: sim?.id || null };
  if (!d.client_name||!d.start_time||!d.end_time) return alert('Champs obligatoires manquants');
  if (id) {
    const r = await db.patch('simulator_sessions', id, d);
    const u = first(r)||{...S.sims.find(s=>s.id===id),...d};
    S.sims = S.sims.map(s => s.id===id ? u : s);
  } else {

// Labels for each FR radio item to display in the NO-GO alert
const FR_NOGO_LABELS = {
  'fr-a1': 'MTOW & CG dans enveloppe AFM',
  'fr-b1': 'Météo départ ≥ minima HOVE',
  'fr-b2': 'Météo destination ≥ minima',
  'fr-b3': 'Météo dégagement ≥ minima',
  'fr-b4': 'Aucun SIGMET actif non mitigé',
  'fr-b5': 'Turbulences ≤ modérées',
  'fr-c1': 'ARC valide',
  'fr-c2': 'Aucune échéance 50h/100h dépassée',
  'fr-c3': 'MEL vérifiée — aucun NO-GO item inopérant',
  'fr-c4': 'CAPS armé, pin retiré, échéance valide',
  'fr-c5': 'TKS/FIKI niveau fluide OK',
  'fr-c6': 'Aucune AN catégorie A non clôturée',
  'fr-c7': 'Carburant confirmé',
  'fr-d1': 'Repos ≥ 8h dans les 24h précédant le vol',
  'fr-d2': 'Aucun médicament incompatible',
  'fr-d3': 'Aucune pathologie aiguë',
  'fr-d4': 'Alcool 0,00 g/L — délai ≥ 12h',
  'fr-d5': 'État psychologique nominal',
  'fr-d6': 'KSS ≤ 6',
  'fr-e1': 'Plan de vol IFR déposé',
  'fr-e2': 'NOTAMs vérifiés',
};

function checkFRNogo() {
  const nogoItems = Object.keys(FR_NOGO_LABELS).filter(id => {
    const el = document.querySelector(`input[name="${id}"]:checked`);
    return el && el.value === 'NO-GO';
  });

  const alert = document.getElementById('fr-nogo-alert');
  const list = document.getElementById('fr-nogo-list');
  const goLabel = document.getElementById('fr-dec-go-label');
  const goRadio = document.getElementById('fr-dec-go');
  const nogoRadio = document.getElementById('fr-dec-nogo');
  const btnSave = document.getElementById('fr-btn-save');
  const btnDO = document.getElementById('fr-btn-do');

  if (!alert) return;

  if (nogoItems.length > 0) {
    // Show alert with list of NO-GO items
    list.innerHTML = nogoItems.map(id => `⛔ ${FR_NOGO_LABELS[id]}`).join('<br>');
    alert.style.display = 'block';
    // Force decision to NO-GO
    if (nogoRadio) { nogoRadio.checked = true; }
    // Disable GO option
    if (goRadio) { goRadio.disabled = true; goRadio.checked = false; }
    if (goLabel) { goLabel.style.opacity = '0.35'; goLabel.style.cursor = 'not-allowed'; }
    // Show DO button, hide save
    if (btnSave) btnSave.style.display = 'none';
    if (btnDO) btnDO.style.display = 'inline-block';
  } else {
    alert.style.display = 'none';
    list.innerHTML = '';
    if (goRadio) { goRadio.disabled = false; }
    if (goLabel) { goLabel.style.opacity = '1'; goLabel.style.cursor = 'pointer'; }
    if (btnSave) btnSave.style.display = 'inline-block';

function calcMC() {
  const g = id => parseFloat(document.getElementById(id)?.value||0)||0;
  const bew=g('mc-bew'),bewb=g('mc-bewb'),p1=g('mc-p1'),p2=g('mc-p2'),p3=g('mc-p3'),p4=g('mc-p4'),bag=g('mc-bag'),fuelL=g('mc-fuel');
  const fuelKg=fuelL*0.72, zfw=bew+p1+p2+p3+p4+bag, tow=zfw+fuelKg;
  const momTOW=bew*bewb+p1*143+p2*143+p3*177+p4*177+bag*208.3+fuelKg*150;
  const cgTO=tow>0?(momTOW/tow).toFixed(2):'—';
  const fuelLd=fuelKg*0.85, lw=zfw+fuelLd, momLD=bew*bewb+p1*143+p2*143+p3*177+p4*177+bag*208.3+fuelLd*150;
  const cgLD=lw>0?(momLD/lw).toFixed(2):'—';
  const ok=tow<=1633&&cgTO>=137.5&&cgTO<=141.0;
  document.getElementById('mc-zfw').textContent=zfw.toFixed(1);
  document.getElementById('mc-tow').textContent=tow.toFixed(1);
  document.getElementById('mc-cgto').textContent=cgTO;
  document.getElementById('mc-cgld').textContent=cgLD;
  const v=document.getElementById('mc-verdict');
  if(tow>0){v.style.color=ok?'var(--green)':'var(--red)';v.textContent=ok?'✅ DANS L\'ENVELOPPE — GO':'🚫 HORS LIMITES — NO-GO'+(tow>1633?' (MTOW dépassée)':'')+(cgTO<137.5||cgTO>141.0?' (CG hors enveloppe)':'');}
}

async function deleteForm(id) {
  if (!confirm('Supprimer ce formulaire ?')) return;
  try { await db.del('hove_forms',id); } catch(e) {}
  S.forms=S.forms.filter(f=>f.id!==id); renderFormulaires();
}

// ICAO waypoint coordinates (subset for common French/European waypoints)
const ICAO_COORDS = {
  LFQT:[50.617,2.640],LFEU:[48.868,5.188],LFPG:[49.009,2.548],LFLY:[45.726,5.081],
  LFMN:[43.665,7.215],LFJL:[49.073,6.251],LFBO:[43.629,1.363],LFML:[43.439,5.221],
  LFPB:[48.958,2.441],LFPO:[48.723,2.380],LFRS:[47.153,-1.610],LFRN:[48.069,-1.727],
  LFBD:[44.828,-0.715],LFBZ:[43.469,-1.523],LFSB:[47.590,7.529],LSZH:[47.464,8.549],
  EBBR:[50.902,4.484],EGLL:[51.477,-0.461],EDDF:[50.034,8.571],EDDM:[48.354,11.786],
  LIRF:[41.800,12.238],LEMD:[40.494,-3.567],MVC:[50.572,2.587],BARLI:[50.432,2.771],
  CMB:[50.228,3.152],VERMA:[50.000,3.243],LESDO:[49.808,3.318],MMD:[49.392,5.125],
};

function getCoords(icao) {
  if (!icao) return null;
  const k = icao.toUpperCase().trim();
  return ICAO_COORDS[k] || null;
}

function parseRoute(routeStr) {
  // Extract ICAO codes (4-letter uppercase starting with L or E or K etc.)
  const tokens = routeStr.toUpperCase().split(/[\s,\/]+/).filter(t => t.length >= 2);
  return tokens.filter(t => ICAO_COORDS[t]);
}

/* ── MAP ── */
let _ofpMap = null;
let _ofpLayers = [];

function ofpInitMap() {
  const el = document.getElementById('ofp-map');
  if (!el || !window.L) return;
  if (_ofpMap) { _ofpMap.remove(); _ofpMap = null; }

  _ofpMap = L.map('ofp-map', { zoomControl: true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(_ofpMap);

  _ofpMap.setView([49.5, 3.5], 6);
  ofpDrawRoute();
}

function ofpUpdateMap() {
  // Save current input values to state
  S.ofpData.dep = (document.getElementById('ofp-dep')?.value||'').toUpperCase();
  S.ofpData.arr = (document.getElementById('ofp-arr')?.value||'').toUpperCase();
  S.ofpData.route = document.getElementById('ofp-route')?.value||'';
  if (_ofpMap) ofpDrawRoute();
}

function ofpDrawRoute() {
  if (!_ofpMap) return;
  // Clear previous layers
  _ofpLayers.forEach(l => _ofpMap.removeLayer(l));
  _ofpLayers = [];

  const dep = (document.getElementById('ofp-dep')?.value||S.ofpData.dep||'').toUpperCase().trim();
  const arr = (document.getElementById('ofp-arr')?.value||S.ofpData.arr||'').toUpperCase().trim();
  const routeStr = document.getElementById('ofp-route')?.value||S.ofpData.route||'';

  // Build waypoint list: dep + route waypoints + arr
  const routeWpts = parseRoute(routeStr);
  const allKeys = [...new Set([dep, ...routeWpts, arr])].filter(k => k && ICAO_COORDS[k]);
  
  if (allKeys.length < 2) {
    // Just show Europe if not enough points
    _ofpMap.setView([49.5, 3.5], 6);
    return;
  }

  const coords = allKeys.map(k => ICAO_COORDS[k]);

  // Draw polyline
  const line = L.polyline(coords, { color: '#0B2559', weight: 3, opacity: 0.9, dashArray: null }).addTo(_ofpMap);
  _ofpLayers.push(line);

  // Markers
  allKeys.forEach((k, i) => {
    const c = ICAO_COORDS[k];
    const isAirport = i === 0 || i === allKeys.length - 1;
    const marker = L.circleMarker(c, {
      radius: isAirport ? 8 : 5,
      fillColor: i === 0 ? '#10B981' : i === allKeys.length-1 ? '#EF4444' : '#0B2559',
      color: '#fff',
      weight: 2,
      fillOpacity: 1,
    }).addTo(_ofpMap);
    marker.bindTooltip(`<strong>${k}</strong>`, { permanent: isAirport, direction: 'top', className: '' });
    _ofpLayers.push(marker);
  });

  // Fit bounds
  _ofpMap.fitBounds(line.getBounds(), { padding: [40, 40] });
}

/* ── MASS CALC ── */
function ofpCalcMass() {
  const acSel = document.getElementById('ofp-ac');
  const dow = acSel ? (parseFloat(acSel.options[acSel.selectedIndex]?.dataset?.dow) || S.ofpData.dow || 1065) : (S.ofpData.dow || 1065);
  const dowEl = document.getElementById('ofp-dow-val');
  if (dowEl) dowEl.textContent = dow + ' kg';

  const pax = parseFloat(document.getElementById('ofp-pax')?.value) || 0;
  const cargo = parseFloat(document.getElementById('ofp-cargo')?.value) || 0;
  const fuelBlock = parseFloat(document.getElementById('ofp-fuel-block')?.value) || 0;
  const fuelTrip = parseFloat(document.getElementById('ofp-fuel-trip')?.value) || 0;
  const fuelTaxi = parseFloat(document.getElementById('ofp-fuel-taxi')?.value) || 0;

  const pld = pax + cargo;
  const zfw = dow + pld;
  const tow = zfw + fuelBlock;
  const law = tow - fuelTrip;
  const margin = 1633 - tow;
  const MTOW = 1633;

  const set = (id, val, color) => {
    const el = document.getElementById(id);
    if (el) {
      el.textContent = val;
      if (color) el.style.color = color;
    }
  };

  set('r-dow', dow + ' kg');
  set('r-pld', pld + ' kg');
  set('r-zfw', zfw + ' kg');
  set('r-fuel', fuelBlock + ' kg');
  set('r-tow', tow + ' kg', tow > MTOW ? 'var(--red)' : 'var(--navy)');
  set('r-law', law + ' kg');
  set('r-margin', (margin >= 0 ? '+' : '') + margin + ' kg', margin < 0 ? 'var(--red)' : margin < 50 ? 'var(--amber)' : 'var(--green)');

  const alertEl = document.getElementById('ofp-weight-alert');
  if (alertEl) alertEl.style.display = tow > MTOW ? 'block' : 'none';
}

/* ── STEP NAVIGATION ── */
function ofpNext(from) {
  if (from === 1) {
    const acSel1 = document.getElementById('ofp-ac');
    S.ofpData.aircraft_id = acSel1?.value;
    const selAc = S.aircraft.find(a => a.id === acSel1?.value);
    S.ofpData.acName = selAc ? selAc.name : '';
    S.ofpData.acReg = selAc ? (selAc.registration||'') : '';
    S.ofpData.acModel = selAc ? (selAc.model||'SR22') : 'SR22';
    S.ofpData.cdb = document.getElementById('ofp-cdb')?.value;
    S.ofpData.date = document.getElementById('ofp-date')?.value;
    S.ofpData.etd = document.getElementById('ofp-etd')?.value;
    S.ofpData.route = document.getElementById('ofp-route')?.value;
    S.ofpData.dep = (document.getElementById('ofp-dep')?.value||'').toUpperCase();
    S.ofpData.arr = (document.getElementById('ofp-arr')?.value||'').toUpperCase();
    S.ofpData.alt = (document.getElementById('ofp-alt')?.value||'').toUpperCase();
    S.ofpData.fl = document.getElementById('ofp-fl')?.value;
    // Retrieve DOW from selected aircraft
    const acSel = document.getElementById('ofp-ac');
    S.ofpData.dow = parseFloat(acSel?.options[acSel.selectedIndex]?.dataset?.dow) || 1065;
    S.ofpStep = 2;
  } else if (from === 2) {
    S.ofpData.pax = document.getElementById('ofp-pax')?.value;
    S.ofpData.cargo = document.getElementById('ofp-cargo')?.value;
    S.ofpData.fuelBlock = document.getElementById('ofp-fuel-block')?.value;
    S.ofpData.fuelTrip = document.getElementById('ofp-fuel-trip')?.value;
    S.ofpData.fuelTaxi = document.getElementById('ofp-fuel-taxi')?.value;
    const tow = (S.ofpData.dow||1065) + parseFloat(S.ofpData.pax||0) + parseFloat(S.ofpData.cargo||0) + parseFloat(S.ofpData.fuelBlock||0);
    if (tow > 1633) { alert('⛔ TOW dépasse le MTOW (1 633 kg). Corrige les masses avant de continuer.'); return; }
    S.ofpStep = 3;
  }
  if (_ofpMap) { _ofpMap.remove(); _ofpMap = null; }
  renderOFP();
}

function ofpSaveStep3() {
  S.ofpData.metarDep = document.getElementById('ofp-metar-dep')?.value||'';
  S.ofpData.metarArr = document.getElementById('ofp-metar-arr')?.value||'';
  S.ofpData.metarAlt = document.getElementById('ofp-metar-alt')?.value||'';
  S.ofpData.notams = document.getElementById('ofp-notams')?.value||'';
  S.ofpData.comments = document.getElementById('ofp-comments')?.value||'';
}

/* ── PDF GENERATION (SimBrief style) ── */
async function generateOFPpdf(dataOverride) {
  const d = dataOverride || S.ofpData;
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  const W=210, M=12; let y=15;
  const now = new Date();

  const line = (text, yy, size=8, style='normal', color=[0,0,0]) => {
    doc.setFontSize(size); doc.setFont('courier', style); doc.setTextColor(...color);
    doc.text(text, M, yy);
  };
  const sep = (yy) => {
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.2);
    doc.line(M, yy, W-M, yy);
    return yy + 4;
  };
  const hdr = (title, yy) => {
    doc.setFillColor(11,37,89); doc.rect(M, yy-4, W-2*M, 7, 'F');
    doc.setFontSize(8); doc.setFont('courier','bold'); doc.setTextColor(255,255,255);
    doc.text(title, M+2, yy+1);
    doc.setTextColor(0,0,0);
    return yy + 8;
  };
  const row = (label, value, yy) => {
    doc.setFontSize(8); doc.setFont('courier','normal'); doc.setTextColor(80,80,80);
    doc.text(label, M, yy);
    doc.setFont('courier','bold'); doc.setTextColor(0,0,0);
    doc.text(String(value||'—'), M+65, yy);
    doc.setDrawColor(230,230,230); doc.setLineWidth(0.1);
    doc.line(M, yy+1.5, W-M, yy+1.5);
    return yy + 6;
  };

  // ── HEADER ──
  doc.setFillColor(11,37,89); doc.rect(0,0,W,30,'F');
  doc.setFont('courier','bold'); doc.setFontSize(14); doc.setTextColor(255,255,255);
  doc.text('HVE 0000', M, 11);
  doc.setFontSize(10);
  doc.text(`${d.dep||'????'}/${d.arr||'????'}`, M, 19);
  doc.setFontSize(8); doc.setFont('courier','normal');
  doc.text(`${d.date||'??'} / ${d.etd||'????'}Z`, M, 25);
  doc.setFontSize(8);
  const ref = `OFP-HOVE-${(d.date||'').replace(/-/g,'')}-${String(Math.floor(Math.random()*900)+100)}`;
  doc.text(ref, W-M, 11, {align:'right'});
  doc.text(`${d.acReg||d.acName||'CIRRUS SR22'} ${d.acModel||''}`.trim(), W-M, 19, {align:'right'});
  doc.text(`FLIGHT PLANNING BY HOVE OPS`, W-M, 25, {align:'right'});

  y = 38;

  // Dispatcher comments
  if (d.comments) {
    y = hdr('DISPATCHER COMMENTS', y);
    doc.setFontSize(8); doc.setFont('courier','normal'); doc.setTextColor(0,0,0);
    doc.splitTextToSize(d.comments, W-2*M).forEach(l => { doc.text(l, M, y); y += 4.5; });
    y += 4;
  }

  // ── FLIGHT SUMMARY ──
  y = hdr('FLIGHT SUMMARY', y);
  const dow = parseFloat(d.dow)||1065;
  const pax = parseFloat(d.pax)||0;
  const cargo = parseFloat(d.cargo)||0;
  const fuelBlock = parseFloat(d.fuelBlock)||0;
  const fuelTrip = parseFloat(d.fuelTrip)||0;
  const fuelTaxi = parseFloat(d.fuelTaxi)||0;
  const pld = pax+cargo;
  const zfw = dow+pld;
  const tow = zfw+fuelBlock;
  const law = tow-fuelTrip;

  const sumLines = [
    `OFP 1/0/1  ${(d.date||'').replace(/-/g,'').slice(2)}`,
    `HVE0000              ${(d.acReg||'????').padEnd(8)}${(d.acModel||'SR22').padEnd(20)}`,
    `ATC:HVE  ${d.dep||'????'}/HZB  ${d.etd||'????'}Z`,
    `         ${d.arr||'????'}/...  ETA ....Z`,
    `STA ....  CRZ SYS 85-PCT`,
  ];
  sumLines.forEach(l => { doc.setFontSize(8); doc.setFont('courier','normal'); doc.text(l,M,y); y+=4.5; });
  y += 3;

  y = hdr('LIMITATIONS', y);
  const limLines = [
    `${'DOW'.padEnd(8)} ${String(dow).padStart(6)}`,
    `${'PLD'.padEnd(8)} ${String(pld).padStart(6)}`,
    `${'ZFW'.padEnd(8)} ${String(zfw).padStart(6)}   ZFWMAX 1542`,
    `${'TOW'.padEnd(8)} ${String(tow).padStart(6)}   MTOW   1633${tow>1633?' *** EXCEED ***':''}`,
    `${'LAW'.padEnd(8)} ${String(law).padStart(6)}   MLMW   1633`,
    `${'BLOCK'.padEnd(8)} ${String(fuelBlock).padStart(6)}`,
  ];
  limLines.forEach(l => { doc.setFontSize(8); doc.setFont('courier', l.includes('EXCEED')?'bold':'normal'); doc.setTextColor(l.includes('EXCEED')?239:0, l.includes('EXCEED')?68:0, l.includes('EXCEED')?68:0); doc.text(l,M,y); y+=4.5; });
  doc.setTextColor(0,0,0);
  y += 3;

  y = hdr('FUEL SUMMARY', y);
  const fuelLines = [
    `${'TRIP'.padEnd(16)} ${String(fuelTrip).padStart(5)}`,
    `${'TAXI OUT'.padEnd(16)} ${String(fuelTaxi).padStart(5)}`,
    `${'BLOCK FUEL'.padEnd(16)} ${String(fuelBlock).padStart(5)}`,
  ];
  fuelLines.forEach(l => { doc.setFontSize(8); doc.setFont('courier','normal'); doc.text(l,M,y); y+=4.5; });
  y += 3;

  y = hdr('ROUTE/FL SUMMARY', y);
  doc.setFontSize(8); doc.setFont('courier','normal');
  doc.text(`${d.dep||'????'}  ${d.fl||'F070'}`, M, y); y+=4.5;
  doc.splitTextToSize(d.route||'DIRECT', W-2*M).forEach(l => { doc.text(l,M,y); y+=4.5; });
  doc.text(`${d.arr||'????'}`, M, y); y+=6;

  if (d.alt) {
    doc.setFontSize(8); doc.setFont('courier','normal');
    doc.text(`ALTN: ${d.alt}`, M, y); y+=6;
  }

  // Meteorology
  if (d.metarDep || d.metarArr || d.metarAlt) {
    if (y > 240) { doc.addPage(); y = 15; }
    y = hdr('WEATHER BULLETIN', y);
    if (d.metarDep) {
      doc.setFontSize(7.5); doc.setFont('courier','bold'); doc.text(`DEPARTURE AIRPORT — ${d.dep||''}`, M, y); y+=4;
      doc.setFont('courier','normal');
      doc.splitTextToSize(d.metarDep, W-2*M).forEach(l => { doc.text(l,M,y); y+=3.8; });
      y+=3;
    }
    if (d.metarArr) {
      doc.setFontSize(7.5); doc.setFont('courier','bold'); doc.text(`DESTINATION AIRPORT — ${d.arr||''}`, M, y); y+=4;
      doc.setFont('courier','normal');
      doc.splitTextToSize(d.metarArr, W-2*M).forEach(l => { doc.text(l,M,y); y+=3.8; });
      y+=3;
    }
    if (d.metarAlt) {
      doc.setFontSize(7.5); doc.setFont('courier','bold'); doc.text(`ALTERNATE — ${d.alt||''}`, M, y); y+=4;
      doc.setFont('courier','normal');
      doc.splitTextToSize(d.metarAlt, W-2*M).forEach(l => { doc.text(l,M,y); y+=3.8; });
      y+=3;
    }
  }

  // NOTAMs
  if (d.notams) {
    if (y > 240) { doc.addPage(); y = 15; }
    y = hdr('NOTAMS / FIR-UIR', y);
    doc.setFontSize(7.5); doc.setFont('courier','normal');
    doc.splitTextToSize(d.notams, W-2*M).forEach(l => { doc.text(l,M,y); y+=3.8; });
    y+=4;
  }

  // PIC Signature
  if (y > 255) { doc.addPage(); y = 15; }
  y += 5;
  doc.setDrawColor(11,37,89); doc.setLineWidth(0.3); doc.rect(M, y, W-2*M, 22);
  doc.setFont('courier','bold'); doc.setFontSize(8); doc.setTextColor(11,37,89);
  doc.text('PIC SIGNATURE', M+3, y+5);
  doc.setTextColor(0,0,0); doc.setFont('courier','normal');
  doc.text(`CAPTAIN NAME: ${d.cdb||'—'}`, M+5, y+11);
  doc.text('SIGNATURE:', M+5, y+17);
  doc.text(`Signé via HOVE OPS · ${now.toLocaleString('fr-FR')} UTC`, W-M, y+17, {align:'right'});

  // Footer
  const pages = doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(150,150,150);
    doc.text(`NOT FOR REAL WORLD NAVIGATION · HOVE AVIATION EXECUTIVE · ${ref} · Page ${i}/${pages}`, W/2, 292, {align:'center'});
  }

  // ── MAP IMAGE ──
  // Try to capture current Leaflet map or draw a vector route map
  try {
    doc.addPage();
    let yMap = 15;
    yMap = hdr('ROUTE', yMap);

    // Try html2canvas capture of live map
    if (_ofpMap && window.html2canvas) {
      const mapEl = document.getElementById('ofp-map');
      if (mapEl && mapEl.offsetWidth > 0) {
        const canvas = await html2canvas(mapEl, { useCORS: true, logging: false, scale: 1.5 });
        const imgData = canvas.toDataURL('image/jpeg', 0.85);
        const imgW = W - 2*M;
        const imgH = imgW * (mapEl.offsetHeight / mapEl.offsetWidth);
        doc.addImage(imgData, 'JPEG', M, yMap, imgW, Math.min(imgH, 120));
        yMap += Math.min(imgH, 120) + 6;
      }
    } else {
      // Fallback: draw SVG-style vector route on PDF
      const dep2 = d.dep||'';
      const arr2 = d.arr||'';
      const routeWpts2 = parseRoute(d.route||'');
      const allKeys2 = [...new Set([dep2, ...routeWpts2, arr2])].filter(k => k && ICAO_COORDS[k]);
      if (allKeys2.length >= 2) {
        const coords2 = allKeys2.map(k => ICAO_COORDS[k]);
        const lats = coords2.map(c => c[0]);
        const lngs = coords2.map(c => c[1]);
        const minLat = Math.min(...lats)-0.5, maxLat = Math.max(...lats)+0.5;
        const minLng = Math.min(...lngs)-0.5, maxLng = Math.max(...lngs)+0.5;
        const mapW = W-2*M, mapH = 80;
        const toX = lng => M + ((lng-minLng)/(maxLng-minLng))*mapW;
        const toY = lat => yMap + mapH - ((lat-minLat)/(maxLat-minLat))*mapH;
        // Background
        doc.setFillColor(240,245,255); doc.rect(M, yMap, mapW, mapH, 'F');
        doc.setDrawColor(200,210,230); doc.setLineWidth(0.3); doc.rect(M, yMap, mapW, mapH, 'S');
        // Grid lines
        doc.setDrawColor(220,225,240); doc.setLineWidth(0.1);
        for(let g=0;g<5;g++){
          const gx = M + (g/4)*mapW; doc.line(gx, yMap, gx, yMap+mapH);
          const gy = yMap + (g/4)*mapH; doc.line(M, gy, M+mapW, gy);
        }
        // Route line
        doc.setDrawColor(11,37,89); doc.setLineWidth(1.2);
        for(let i=0;i<coords2.length-1;i++){
          doc.line(toX(coords2[i][1]), toY(coords2[i][0]), toX(coords2[i+1][1]), toY(coords2[i+1][0]));
        }
        // Waypoint dots + labels
        allKeys2.forEach((k,i) => {
          const cx = toX(ICAO_COORDS[k][1]), cy = toY(ICAO_COORDS[k][0]);
          const isApt = i===0||i===allKeys2.length-1;
          if(i===0) { doc.setFillColor(16,185,129); }
          else if(i===allKeys2.length-1) { doc.setFillColor(239,68,68); }
          else { doc.setFillColor(11,37,89); }
          doc.circle(cx, cy, isApt?2:1.2, 'F');
          doc.setFontSize(6); doc.setFont('courier','bold');
          doc.setTextColor(i===0?16:i===allKeys2.length-1?239:11, i===0?185:i===allKeys2.length-1?68:37, i===0?129:i===allKeys2.length-1?68:89);
          doc.text(k, cx+2, cy-1.5);
        });
        yMap += mapH + 6;
      }
    }

    // Route text below map
    doc.setFontSize(7.5); doc.setFont('courier','normal'); doc.setTextColor(0,0,0);
    const routeDisplay = [d.dep, d.route, d.arr].filter(Boolean).join(' ');
    doc.splitTextToSize(routeDisplay, W-2*M).forEach(l => { doc.text(l, M, yMap); yMap+=4; });
    if (d.alt) { doc.setFont('courier','bold'); doc.text(`ALTN: ${d.alt}`, M, yMap+2); }
  } catch(mapErr) {
    console.warn('Map render skipped:', mapErr);
  }

  doc.save(`${ref}.pdf`);
  return ref;
}

function toggleOFPHist(fid) {
  const body = document.getElementById('ofp-body-'+fid);
  const chev = document.getElementById('ofp-chevron-'+fid);
  if (!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if (chev) chev.textContent = isOpen ? '▼' : '▲';
}

/* ── RELEASE TO EFB ── */
async function releaseToEFB() {
  const d = S.ofpData;
  if (!d.dep || !d.arr) return alert('Départ et destination requis pour le release.');

  const ref = await generateOFPpdf();

  // Find matching flight or create one
  const matchedFlight = S.flights.find(f =>
    f.departure === d.dep && f.arrival === d.arr &&
    f.departure_time?.startsWith(d.date||todayStr())
  );

  const ofpPayload = { ...d, ref, released_at: new Date().toISOString(), released_by: 'HOVE OPS' };

  try {
    if (matchedFlight) {
      // Update existing flight with OFP data and RELEASED status
      await db.patch('flights', matchedFlight.id, {
        status: 'RELEASED',
        ofp_data: JSON.stringify(ofpPayload),
      });
      S.flights = S.flights.map(f => f.id === matchedFlight.id
        ? { ...f, status: 'RELEASED', ofp_data: JSON.stringify(ofpPayload) }
        : f
      );
    } else {
      // Create a new flight entry with released status
      const newFlight = {
        departure: d.dep,
        arrival: d.arr,
        departure_time: `${d.date||todayStr()}T${d.etd||'00:00'}:00Z`,
        pilot_id: S.pilots.find(p => (p.first_name+' '+p.last_name) === d.cdb)?.id || null,
        aircraft_id: d.aircraft_id || null,
        flight_type: 'OFP',
        status: 'RELEASED',
        ofp_data: JSON.stringify(ofpPayload),
      };
      const r = await db.post('flights', newFlight);
      const n = first(r);
      if (n) S.flights.unshift(n);
    }

    // Show success
    const msg = document.getElementById('ofp-released-msg');
    const refEl = document.getElementById('ofp-released-ref');
    if (msg) msg.style.display = 'block';
    if (refEl) refEl.textContent = `Réf: ${ref} · ${new Date().toLocaleTimeString('fr-FR')} UTC`;

    // Reset for next OFP
    setTimeout(() => { S.ofpStep = 1; S.ofpData = {}; renderOFP(); }, 3000);

  } catch(e) {
    alert('Erreur lors du release. OFP PDF généré localement.');
  }
}

function regenOFPpdf(flightId) {
  const f = S.flights.find(f => f.id === flightId);
  if (!f || !f.ofp_data) return alert('Données OFP introuvables');
  try {
    const d = JSON.parse(f.ofp_data);
    generateOFPpdf(d);
  } catch(e) { alert('Erreur de lecture OFP'); }
}
