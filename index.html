<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HOVE OPS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B2559;--navy-h:#0D2E6E;--navy-pale:#EEF2FA;
  --bg:#F7F9FC;--white:#FFFFFF;--border:#E4E9F2;
  --text:#0A0F1E;--t2:#5A6480;--t3:#9AA3BA;
  --amber:#F59E0B;--red:#EF4444;--green:#10B981;
  --red-p:#FEF2F2;--amber-p:#FFFBEB;--green-p:#ECFDF5;
  --r:14px;--shadow:0 1px 3px rgba(11,37,89,.06),0 4px 16px rgba(11,37,89,.05)
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{display:flex;min-height:100vh}

/* SIDEBAR */
#sidebar{width:220px;min-height:100vh;background:var(--white);border-right:1px solid var(--border);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:50}
.s-logo{padding:24px 20px 14px;border-bottom:1px solid var(--border)}
.s-wordmark{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--navy);letter-spacing:-.5px}
.s-sub{font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.s-meta{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#utc{font-family:'Courier New',monospace;font-size:13px;font-weight:600;color:var(--navy)}
#dot{width:8px;height:8px;border-radius:50%;background:var(--green);transition:background .3s}
#dot.err{background:var(--red)}
nav{padding:12px;flex:1}
.nb{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--t2);font-size:14px;font-weight:400;font-family:'DM Sans',sans-serif;text-align:left;margin-bottom:2px;transition:all .15s}
.nb:hover{background:var(--bg);color:var(--navy)}
.nb.on{background:var(--navy-pale);color:var(--navy);font-weight:600}
.nb-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;font-weight:700;display:none}
.s-foot{padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--t3)}

/* MAIN */
#content{margin-left:220px;flex:1;padding:36px 32px 60px;min-width:0}

/* BOTTOM NAV */
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:100;padding:8px 0 12px}
.bnb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;color:var(--t3);cursor:pointer;padding:4px 0;font-size:10px;font-family:'DM Sans',sans-serif}
.bnb.on{color:var(--navy);font-weight:600}

/* TYPOGRAPHY */
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--navy)}
.pg-sub{font-size:14px;color:var(--t2);margin-top:4px}
.sec-label{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;display:block}

/* CARD */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}

/* BUTTONS */
.btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--navy-h)}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-g:hover{border-color:var(--navy);color:var(--navy)}
.btn-d{background:transparent;color:var(--red);border:1px solid var(--red);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-sm{padding:5px 12px;font-size:13px}

/* BADGE */
.badge{display:inline-block;border-radius:6px;padding:3px 8px;font-size:12px;font-weight:600}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--navy-pale);padding:4px;border-radius:10px;width:fit-content;margin-bottom:24px}
.tab{padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--t2);transition:all .15s}
.tab.on{background:var(--navy);color:#fff}

/* FORMS */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:14px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy)}
.field textarea{min-height:80px;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(10,15,30,.5);z-index:1000;align-items:center;justify-content:center;padding:16px}
#overlay.open{display:flex}
#modal{background:var(--white);border-radius:var(--r);border:1px solid var(--border);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow)}
.m-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.m-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--navy)}
.m-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--t2);line-height:1}
.m-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px}
.stat{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:18px 16px;box-shadow:var(--shadow)}
.stat-v{font-family:'Syne',sans-serif;font-size:32px;font-weight:800}
.stat-l{font-size:12px;color:var(--t2);margin-top:4px}

/* LIST ITEMS */
.li{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:16px 20px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.li-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--navy);margin-bottom:4px}
.li-sub{font-size:13px;color:var(--t2)}
.li-actions{display:flex;gap:8px;align-items:center}

/* ALERTS */
.alert-li{padding:12px 16px;background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.alert-li.red{border-left:3px solid var(--red)}
.alert-li.amber{border-left:3px solid var(--amber)}
.alert-li.navy{border-left:3px solid var(--navy)}

/* CREW */
.crew-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.crew-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.crew-div{border-top:1px solid var(--border);padding-top:14px}
.lic-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:10px}
.lic{border-radius:10px;padding:10px 12px}
.lic-n{font-weight:700;font-size:14px}
.lic-d{font-size:12px;color:var(--t2);margin-top:2px}
.lic-s{font-size:11px;font-weight:600;margin-top:2px}
.lic-a{display:flex;gap:6px;margin-top:8px}
.lic-btn{font-size:11px;background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.1);border-radius:5px;padding:2px 8px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* SIGN */
.sign-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.sign-chip{border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px}
.sign-btn{font-size:11px;background:var(--navy);color:#fff;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* MISC */
.empty{text-align:center;padding:48px 20px;color:var(--t3);font-size:14px}
.spinner-w{display:flex;justify-content:center;padding:60px}
.spinner{width:32px;height:32px;border:3px solid var(--navy-pale);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{display:none}
  #bnav{display:flex}
  #content{margin-left:0;padding:20px 16px 90px}
  h1{font-size:22px}
  .g2{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr)}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="s-logo">
      <div class="s-wordmark">HOVE OPS</div>
      <div class="s-sub">Operations</div>
    </div>
    <div class="s-meta">
      <span id="utc">--:-- UTC</span>
      <span id="dot"></span>
    </div>
    <nav id="snav"></nav>
    <div class="s-foot">v2.0 · HOVE Aviation</div>
  </aside>

  <!-- CONTENT -->
  <main id="content">
    <div class="spinner-w"><div class="spinner"></div></div>
  </main>

  <!-- BOTTOM NAV -->
  <nav id="bnav"></nav>
</div>

<!-- MODAL -->
<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="m-head">
      <span class="m-title" id="m-title"></span>
      <button class="m-close" onclick="closeModal()">×</button>
    </div>
    <div id="m-body"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   CONFIG SUPABASE
═══════════════════════════════════════════ */
const SB = 'https://rjwtzwoojfsvpdopmocv.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqd3R6d29vamZzdnBkb3Btb2N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDk3NzAsImV4cCI6MjA5MDg4NTc3MH0.pr2pCDA57woTwl0EkP41jUHwmuDfgyUfa046HF3yg1E';
const H = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

const db = {
  get: (t, q='') => fetch(`${SB}/rest/v1/${t}?${q}`, {headers: H}).then(r => r.json()),
  post: (t, d) => fetch(`${SB}/rest/v1/${t}`, {method:'POST', headers: H, body: JSON.stringify(d)}).then(r => r.json()),
  patch: (t, id, d) => fetch(`${SB}/rest/v1/${t}?id=eq.${id}`, {method:'PATCH', headers: H, body: JSON.stringify(d)}).then(r => r.json()),
  del: (t, id) => fetch(`${SB}/rest/v1/${t}?id=eq.${id}`, {method:'DELETE', headers: H}),
};

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const S = {
  page: 'dashboard',
  pilots: [], aircraft: [], flights: [], sims: [], licenses: [],
  derogations: [], manex: [], signatures: [], forms: [],
  loading: true, synced: false,
  planDate: todayStr(), planTab: 'vols', compTab: 'derog', formTab: 'fr',
};

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function todayStr() {
  return new Date().toISOString().split('T')[0];
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'});
}
function fmtTime(dt) {
  if (!dt) return '—';
  return new Date(dt).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}
function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}
function alertColor(days) {
  if (days === null) return 'var(--t3)';
  if (days < 0) return 'var(--red)';
  if (days < 30) return 'var(--amber)';
  return 'var(--green)';
}
function alertBg(days) {
  if (days === null) return '#F3F4F6';
  if (days < 0) return 'var(--red-p)';
  if (days < 30) return 'var(--amber-p)';
  return 'var(--green-p)';
}
function pilotName(id) {
  const p = S.pilots.find(p => p.id === id);
  return p ? `${p.first_name} ${p.last_name}` : '—';
}
function aircraftName(id) {
  const a = S.aircraft.find(a => a.id === id);
  return a ? a.name : '—';
}
function licLabel(t) {
  return {MEP:'MEP', SEP:'SEP', IRME:'IR/ME', CRM:'CRM', CLASSE_1:'Classe 1'}[t] || t;
}
function alertCount() {
  return S.licenses.filter(l => { const d = daysUntil(l.expiry_date); return d !== null && d < 30; }).length;
}
function safe(arr) { return Array.isArray(arr) ? arr : []; }
function first(res) { const a = safe(res); return a[0] || null; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ═══════════════════════════════════════════
   UTC CLOCK
═══════════════════════════════════════════ */
function tickClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const el = document.getElementById('utc');
  if (el) el.textContent = `${h}:${m} UTC`;
}
setInterval(tickClock, 1000);
tickClock();

/* ═══════════════════════════════════════════
   NAV CONFIG
═══════════════════════════════════════════ */
const PAGES = [
  { id: 'dashboard', label: 'Dashboard', icon: iconGrid() },
  { id: 'planning',  label: 'Planning',  icon: iconCal() },
  { id: 'flotte',   label: 'Flotte',    icon: iconPlane() },
  { id: 'crew',     label: 'Crew',      icon: iconUsers() },
  { id: 'compliance',label: 'Compliance',icon: iconShield() },
  { id: 'formulaires',label: 'Formulaires',icon: iconDoc() },
];

function buildNav() {
  const snav = document.getElementById('snav');
  const bnav = document.getElementById('bnav');
  const cnt = alertCount();

  snav.innerHTML = PAGES.map(p => `
    <button class="nb ${S.page===p.id?'on':''}" onclick="goTo('${p.id}')">
      ${p.icon} ${esc(p.label)}
      ${p.id==='dashboard' && cnt>0 ? `<span class="nb-badge" style="display:inline">${cnt}</span>` : ''}
    </button>`).join('');

  bnav.innerHTML = PAGES.map(p => `
    <button class="bnb ${S.page===p.id?'on':''}" onclick="goTo('${p.id}')">
      ${p.icon} ${esc(p.label)}
    </button>`).join('');

  const dot = document.getElementById('dot');
  if (dot) { dot.className = S.synced ? '' : 'err'; }
}

/* ═══════════════════════════════════════════
   ROUTING
═══════════════════════════════════════════ */
function goTo(page) {
  S.page = page;
  buildNav();
  renderPage();
}

function renderPage() {
  const c = document.getElementById('content');
  if (S.loading) { c.innerHTML = '<div class="spinner-w"><div class="spinner"></div></div>'; return; }
  const r = {
    dashboard: renderDashboard,
    planning: renderPlanning,
    flotte: renderFlotte,
    crew: renderCrew,
    compliance: renderCompliance,
    formulaires: renderFormulaires,
  };
  (r[S.page] || renderDashboard)();
}

/* ═══════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════ */
async function loadAll() {
  S.loading = true;
  renderPage();
  try {
    const [p,a,f,ss,l,d,m,sg,fo] = await Promise.all([
      db.get('pilots','order=created_at.asc'),
      db.get('aircraft','order=created_at.asc'),
      db.get('flights','order=departure_time.desc'),
      db.get('simulator_sessions','order=date.desc,start_time.desc'),
      db.get('licenses','order=expiry_date.asc'),
      db.get('ifr_derogations','order=signed_at.desc'),
      db.get('manex_documents','order=created_at.desc'),
      db.get('manex_signatures','order=signed_at.desc'),
      db.get('hove_forms','order=submitted_at.desc').catch(()=>[]),
    ]);
    S.pilots=safe(p); S.aircraft=safe(a); S.flights=safe(f); S.sims=safe(ss);
    S.licenses=safe(l); S.derogations=safe(d); S.manex=safe(m); S.signatures=safe(sg); S.forms=safe(fo);
    S.synced = true;
  } catch(e) { S.synced = false; }
  S.loading = false;
  buildNav();
  renderPage();
}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
function openModal(title, html) {
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-body').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('m-body').innerHTML = '';
}
function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

/* ═══════════════════════════════════════════
   PAGE: DASHBOARD
═══════════════════════════════════════════ */
function renderDashboard() {
  const c = document.getElementById('content');
  const todayS = todayStr();
  const todayFlights = S.flights.filter(f => f.departure_time?.startsWith(todayS));
  const todaySims = S.sims.filter(s => s.date === todayS);
  const expLics = S.licenses.filter(l => { const d = daysUntil(l.expiry_date); return d !== null && d < 0; });
  const soonLics = S.licenses.filter(l => { const d = daysUntil(l.expiry_date); return d !== null && d >= 0 && d < 30; });
  const allAlerts = [...expLics, ...soonLics];

  const dateStr = new Date().toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

  c.innerHTML = `
    <div class="ph">
      <div>
        <h1>Dashboard</h1>
        <div class="pg-sub">${cap(dateStr)}</div>
      </div>
    </div>

    ${allAlerts.length > 0 ? `
    <div style="margin-bottom:24px">
      <span class="sec-label">Alertes licences</span>
      ${expLics.map(l => `
        <div class="alert-li red">
          <div><strong style="font-size:14px">${licLabel(l.type)}</strong> <span style="color:var(--t2);font-size:13px">— ${pilotName(l.pilot_id)}</span></div>
          <span class="badge" style="background:var(--red-p);color:var(--red)">Expiré ${fmtDate(l.expiry_date)}</span>
        </div>`).join('')}
      ${soonLics.map(l => `
        <div class="alert-li amber">
          <div><strong style="font-size:14px">${licLabel(l.type)}</strong> <span style="color:var(--t2);font-size:13px">— ${pilotName(l.pilot_id)}</span></div>
          <span class="badge" style="background:var(--amber-p);color:var(--amber)">J-${daysUntil(l.expiry_date)}</span>
        </div>`).join('')}
    </div>` : ''}

    <div class="stats">
      <div class="stat"><div class="stat-v" style="color:var(--navy)">${todayFlights.length}</div><div class="stat-l">Vols aujourd'hui</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--navy)">${todaySims.length}</div><div class="stat-l">Séances sim.</div></div>
      <div class="stat"><div class="stat-v" style="color:${allAlerts.length>0?(expLics.length>0?'var(--red)':'var(--amber)'):'var(--green)'}">${allAlerts.length}</div><div class="stat-l">Alertes licences</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--green)">${S.pilots.length}</div><div class="stat-l">Pilotes actifs</div></div>
    </div>

    <span class="sec-label">Vols du jour</span>
    ${todayFlights.length === 0 ? '<div class="card" style="color:var(--t3);font-size:14px;text-align:center;padding:20px">Aucun vol prévu aujourd\'hui</div>' :
      todayFlights.map(f => `
        <div class="li">
          <div>
            <div class="li-title">${esc(f.departure)} → ${esc(f.arrival)}</div>
            <div class="li-sub">${esc(aircraftName(f.aircraft_id))} · ${esc(pilotName(f.pilot_id))}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:700;font-size:15px;color:var(--navy)">${fmtTime(f.departure_time)} → ${fmtTime(f.arrival_time)}</div>

async function saveVol(id) {
  const d = { aircraft_id: val('f-ac'), pilot_id: val('f-pi'), flight_type: val('f-ty'), departure: val('f-dep'), arrival: val('f-arr'), departure_time: val('f-dt'), arrival_time: val('f-at'), notes: val('f-no') };

function calcMC() {
  const g = id => parseFloat(document.getElementById(id)?.value||0)||0;
  const bew = g('mc-bew'), bewb = g('mc-bewb');
  const p1=g('mc-p1'), p2=g('mc-p2'), p3=g('mc-p3'), p4=g('mc-p4'), bag=g('mc-bag');
  const fuelL=g('mc-fuel'), fuelKg=fuelL*0.72;
  const zfw = bew+p1+p2+p3+p4+bag;
  const tow = zfw+fuelKg;
  const momZFW = bew*bewb + p1*143 + p2*143 + p3*177 + p4*177 + bag*208.3;
  const momTOW = momZFW + fuelKg*150;
  const cgTO = tow>0 ? (momTOW/tow).toFixed(2) : '—';
  const fuelLd = fuelKg - (fuelKg*0.15); // approx consumed
  const lw = zfw + fuelLd;
  const momLD = momZFW + fuelLd*150;
  const cgLD = lw>0 ? (momLD/lw).toFixed(2) : '—';
  const ok = tow<=1633 && cgTO>=137.5 && cgTO<=141.0;
  document.getElementById('mc-zfw').textContent = zfw.toFixed(1);
  document.getElementById('mc-tow').textContent = tow.toFixed(1);
  document.getElementById('mc-cgto').textContent = cgTO;
  document.getElementById('mc-cgld').textContent = cgLD;
  const v = document.getElementById('mc-verdict');
  if(tow>0) {
    v.style.color = ok?'var(--green)':'var(--red)';
    v.textContent = ok ? '✅ DANS L\'ENVELOPPE — GO' : `🚫 HORS LIMITES — NO-GO${tow>1633?' (MTOW dépassée)':''}${cgTO<137.5||cgTO>141.0?' (CG hors enveloppe)':''}`;
  }
}

// ── SAVE FORM ─────────────────────────────
function getRadio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : '—';
}
function getFieldVal(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

async function saveForm(type) {
  const now = new Date();
  const ts = now.toISOString();
  const prefixes = { fr:'FR', mc:'MC', rex:'REX', tl:'TL', si:'SI', nav:'FRO' };
  const dateTag = now.toISOString().slice(0,10).replace(/-/g,'');
  const seq = String(S.forms.filter(f=>f.type===type).length+1).padStart(3,'0');
  const refNumber = `${prefixes[type]}-HOVE-${dateTag}-${seq}`;

  const getters = {
    fr: () => ({
      date: getFieldVal('fr-date'), etd: getFieldVal('fr-etd'),
      departure: getFieldVal('fr-dep'), arrival: getFieldVal('fr-arr'),
      alternate: getFieldVal('fr-alt'), pilot_name: getFieldVal('fr-cdb'),
      flight_type: getFieldVal('fr-type'), tow: getFieldVal('fr-tow'), cg: getFieldVal('fr-cg'),
      meteo_source: getFieldVal('fr-meteo'), tt: getFieldVal('fr-tt'),
      kss: getFieldVal('fr-kss'), ifps: getFieldVal('fr-ifps'),
      decision: getRadio('fr-dec'), motif: getFieldVal('fr-motif'),
      sec_a: getRadio('fr-a1'), sec_b: [1,2,3,4,5].map(i=>getRadio(`fr-b${i}`)).join(','),
      sec_c: [1,2,3,4,5,6,7].map(i=>getRadio(`fr-c${i}`)).join(','),
      sec_d: [1,2,3,4,5,6].map(i=>getRadio(`fr-d${i}`)).join(','),
      sec_e: [1,2].map(i=>getRadio(`fr-e${i}`)).join(','),
      fuel_traj: getFieldVal('fr-fuel1'), fuel_cont: getFieldVal('fr-fuel2'),
      fuel_alt: getFieldVal('fr-fuel3'), fuel_res: getFieldVal('fr-fuel4'),
    }),
    mc: () => ({
      date: getFieldVal('mc-date'), pilot_name: getFieldVal('mc-cdb'),
      departure: getFieldVal('mc-dep'), arrival: getFieldVal('mc-arr'),
      bew: getFieldVal('mc-bew'), bew_arm: getFieldVal('mc-bewb'),
      p1: getFieldVal('mc-p1'), p2: getFieldVal('mc-p2'), p3: getFieldVal('mc-p3'), p4: getFieldVal('mc-p4'),
      baggage: getFieldVal('mc-bag'), fuel_liters: getFieldVal('mc-fuel'),
      zfw: document.getElementById('mc-zfw')?.textContent||'',
      tow: document.getElementById('mc-tow')?.textContent||'',
      cg_to: document.getElementById('mc-cgto')?.textContent||'',
      cg_ld: document.getElementById('mc-cgld')?.textContent||'',
      verdict: document.getElementById('mc-verdict')?.textContent||'',
    }),
    rex: () => ({
      date: getFieldVal('rex-date'), pilot_name: getFieldVal('rex-pilot'),
      departure: getFieldVal('rex-dep'), arrival: getFieldVal('rex-arr'),
      phase: getFieldVal('rex-phase'), fr_ref: getFieldVal('rex-fr'),
      category: getFieldVal('rex-cat'), severity: getFieldVal('rex-grav'),
      description: getFieldVal('rex-desc'), factors: getFieldVal('rex-factors'),
      immediate_actions: getFieldVal('rex-actions'),
    }),
    tl: () => ({
      date: getFieldVal('tl-date'), pilot_name: getFieldVal('tl-cdb'),
      departure: getFieldVal('tl-dep'), arrival: getFieldVal('tl-arr'),
      off_time: getFieldVal('tl-off'), on_time: getFieldVal('tl-on'),
      tt_start: getFieldVal('tl-tts'), tt_end: getFieldVal('tl-tta'),
      fuel_loaded: getFieldVal('tl-fuel'), fuel_remaining: getFieldVal('tl-fuelr'),
      pax: getFieldVal('tl-pax'), anomaly_status: getRadio('tl-ano'),
      anomaly_desc: getFieldVal('tl-anomalie'),
      preflight: [1,2,3,4,5,6,7,8].map(i=>getRadio(`tl-a${i}`)).join(','),
    }),
    si: () => ({
      date: getFieldVal('si-date'), pilot_name: getFieldVal('si-pilot'),
      fr_ref: getFieldVal('si-fr'), anonymous: getFieldVal('si-anon'),
      description: getFieldVal('si-desc'), severity: getFieldVal('si-grav'),
      eccairs: getFieldVal('si-eccairs'), suggestions: getFieldVal('si-sugg'),
    }),
    nav: () => ({
      date: getFieldVal('nav-date'), pilot_name: getFieldVal('nav-cdb'),
      departure: getFieldVal('nav-dep'), arrival: getFieldVal('nav-arr'),
      alternate: getFieldVal('nav-alt'), nav_type: getFieldVal('nav-type'),
      fl: getFieldVal('nav-fl'), tas: getFieldVal('nav-tas'),
      route: getFieldVal('nav-route'),
      fuel_loaded: getFieldVal('nav-fuel-emb'), fuel_traj: getFieldVal('nav-fuel-traj'),
      fuel_cont: getFieldVal('nav-fuel-cont'), fuel_alt: getFieldVal('nav-fuel-deg'),
      fuel_res: getFieldVal('nav-fuel-res'), fuel_actual: getFieldVal('nav-fuel-reel'),
      meteo_notes: getFieldVal('nav-meteo'),
    }),
  };

  const data = (getters[type]||(() => ({})))();
  const record = {
    type, ref_number: refNumber, submitted_at: ts,
    pilot_name: data.pilot_name||'—',
    departure: data.departure||'', arrival: data.arrival||'',
    data: JSON.stringify(data),
  };

  try {
    const r = await db.post('hove_forms', record);
    const n = first(r);
    S.forms.unshift(n||{...record, id: 'local-'+Date.now()});
  } catch(e) {
    S.forms.unshift({...record, id: 'local-'+Date.now()});
  }
  closeModal();
  renderFormulaires();
  setTimeout(() => {
    const latest = S.forms.find(f=>f.ref_number===refNumber);
    if(latest) exportFormPDF(latest.id, data, type, refNumber);
  }, 300);
}

// ── DELETE FORM ───────────────────────────
async function deleteForm(id) {
  if (!confirm('Supprimer ce formulaire ?')) return;
  try { await db.del('hove_forms', id); } catch(e) {}
  S.forms = S.forms.filter(f => f.id !== id);
  renderFormulaires();
}

// ── EXPORT PDF ────────────────────────────
function exportFormPDF(formId, dataOverride, typeOverride, refOverride) {
  const form = S.forms.find(f => f.id === formId);
  if (!form && !dataOverride) return alert('Formulaire introuvable');
  const data = dataOverride || JSON.parse(form?.data||'{}');
  const type = typeOverride || form?.type;
  const ref  = refOverride  || form?.ref_number || '—';
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, M = 15;
  let y = 15;

  const typeLabels = { fr:'FLIGHT RELEASE — FR-HOVE-01', mc:'MASSE & CENTRAGE — MC-HOVE-01', rex:'REX — REX-HOVE-01', tl:'TECH-LOG — TL-HOVE-01', si:'SIGNALEMENT INTERNE — SI-HOVE-01', nav:'NAVIGATION LOG — FRO-HOVE-01' };

  // Header
  doc.setFillColor(11, 37, 89);
  doc.rect(0, 0, W, 28, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(15); doc.setFont('helvetica','bold');
  doc.text('HOVE AVIATION EXECUTIVE', M, 10);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text(typeLabels[type]||type.toUpperCase(), M, 17);
  doc.text('NCO — Opérations Non Commerciales — Cirrus SR22 G7+', M, 23);
  doc.setFontSize(9);
  doc.text(`Réf: ${ref}`, W-M, 10, {align:'right'});
  doc.text(`Soumis: ${new Date(form?.submitted_at||Date.now()).toLocaleString('fr-FR')} UTC`, W-M, 16, {align:'right'});
  doc.text('Éd.01 - Rév.00 · MANEX HOVE-OM · 2026', W-M, 22, {align:'right'});

  y = 36;
  doc.setTextColor(0,0,0);

  const addSection = (title) => {
    if (y > 265) { doc.addPage(); y = 15; }
    doc.setFillColor(238, 242, 250);
    doc.rect(M, y, W-2*M, 7, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9);
    doc.setTextColor(11,37,89);
    doc.text(title.toUpperCase(), M+3, y+5);
    doc.setTextColor(0,0,0);
    y += 10;
  };

  const addRow = (label, value, highlight) => {
    if (y > 272) { doc.addPage(); y = 15; }
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
    doc.text(label, M, y);
    doc.setFont('helvetica','bold');
    if (highlight) {
      doc.setTextColor(value==='GO'||value==='SAT'||value?.includes('DANS')?0x10:0xEF,
                       value==='GO'||value==='SAT'||value?.includes('DANS')?0xB9:0x44,
                       value==='GO'||value==='SAT'||value?.includes('DANS')?0x81:0x44);
    }
    doc.text(String(value||'—'), W-M, y, {align:'right'});
    doc.setTextColor(0,0,0);
    doc.setDrawColor(228,233,242);
    doc.line(M, y+1.5, W-M, y+1.5);
    y += 6;
  };

  const addTextBlock = (label, text) => {
    if (y > 260) { doc.addPage(); y = 15; }
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
    doc.text(label, M, y); y += 5;
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    const lines = doc.splitTextToSize(text||'—', W-2*M);
    lines.forEach(line => {
      if (y > 272) { doc.addPage(); y = 15; }
      doc.text(line, M, y); y += 4.5;
    });
    y += 3;
  };

  // Build PDF content per type
  if (type === 'fr') {
    addSection('IDENTIFICATION DU VOL');
    addRow('Date UTC', data.date); addRow('ETD UTC', data.etd);
    addRow('Départ', data.departure); addRow('Destination', data.arrival);
    addRow('Dégagement', data.alternate); addRow('CDB / PIC', data.pilot_name);
    addRow('Type de vol', data.flight_type); addRow('Immatriculation', 'N151AL');
    addSection('§A — MASSE & CENTRAGE');
    addRow('MTOW & CG', data.sec_a, true); addRow('TOW (kg)', data.tow); addRow('CG décollage (po)', data.cg);
    addSection('§B — MÉTÉOROLOGIE');
    const bItems = ['Départ','Destination','Dégagement','SIGMETs','Turbulences'];
    (data.sec_b||'').split(',').forEach((v,i) => addRow(bItems[i]||'', v, true));
    addRow('Source météo', data.meteo_source);
    addSection('§C — TECH-LOG & NAVIGABILITÉ');
    const cItems = ['ARC valide','50h/100h OK','MEL OK','CAPS OK','TKS OK','AN-A clôturées','Carburant OK'];
    (data.sec_c||'').split(',').forEach((v,i) => addRow(cItems[i]||'', v, true));
    addRow('Heures cellule TT', data.tt);
    addSection('§D — PILOTE FIT');
    const dItems = ['Repos ≥8h','Médicaments OK','Santé OK','Alcool 0,00','Psy OK','KSS ≤6'];
    (data.sec_d||'').split(',').forEach((v,i) => addRow(dItems[i]||'', v, true));
    addRow('Score KSS', data.kss);
    addSection('§E — CARBURANT & PLAN DE VOL');
    addRow('Carburant trajet (kg)', data.fuel_traj); addRow('Contingence (kg)', data.fuel_cont);
    addRow('Dégagement (kg)', data.fuel_alt); addRow('Réserve 45\' (kg)', data.fuel_res);
    const eItems = ['Plan IFR déposé','NOTAMs vérifiés'];
    (data.sec_e||'').split(',').forEach((v,i) => addRow(eItems[i]||'', v, true));
    addRow('Réf. IFPS', data.ifps);
    addSection('DÉCISION FINALE');
    addRow('DÉCISION', data.decision, true);
    if (data.motif) addTextBlock('Motif / dérogation DO :', data.motif);
  } else if (type === 'mc') {
    addSection('IDENTIFICATION'); addRow('Date UTC', data.date); addRow('CDB', data.pilot_name); addRow('Départ', data.departure); addRow('Destination', data.arrival);
    addSection('TABLEAU DE CHARGEMENT');
    addRow('BEW (kg)', data.bew); addRow('Bras BEW (po)', data.bew_arm);
    addRow('Pilote avant G (kg)', data.p1); addRow('Copilote / PAX avant D (kg)', data.p2);
    addRow('PAX AR G (kg)', data.p3); addRow('PAX AR D (kg)', data.p4);
    addRow('Bagages soute (kg)', data.baggage); addRow('Carburant (L)', data.fuel_liters);
    addSection('RÉSULTATS');
    addRow('ZFW (kg)', data.zfw); addRow('TOW (kg)', data.tow);
    addRow('CG décollage (po)', data.cg_to); addRow('CG atterrissage (po)', data.cg_ld);
    addRow('VERDICT', data.verdict, true);
  } else if (type === 'rex') {
    addSection('SECTION 1 — IDENTIFICATION'); addRow('Date UTC', data.date); addRow('Pilote déclarant', data.pilot_name); addRow('Départ', data.departure); addRow('Destination', data.arrival); addRow('Phase de vol', data.phase); addRow('N° FR associé', data.fr_ref);
    addSection('SECTION 2 — CLASSIFICATION'); addRow('Catégorie', data.category); addRow('Gravité', data.severity, true);
    addTextBlock('SECTION 3 — DESCRIPTION DES FAITS', data.description);
    addTextBlock('SECTION 4 — FACTEURS CONTRIBUANTS', data.factors);
    addTextBlock('SECTION 5 — ACTIONS IMMÉDIATES', data.immediate_actions);
    addSection('SECTION 7 — CLÔTURE'); addRow('Statut', 'OUVERT');
    addRow('Pilote déclarant (J+0)', data.pilot_name); addRow('DO — Analyse (J+2)', '— à compléter'); addRow('DR — Validation (J+30)', '— à compléter');
  } else if (type === 'tl') {
    addSection('A — PRÉ-VOL');
    const aItems = ['ARC valide','50h OK','100h/annuelle OK','CAPS OK','TKS OK','MEL OK','AN-A OK','Carburant OK'];
    (data.preflight||'').split(',').forEach((v,i) => addRow(aItems[i]||'', v, true));
    addSection('B — DONNÉES DU VOL'); addRow('Date UTC', data.date); addRow('CDB', data.pilot_name); addRow('Départ', data.departure); addRow('Destination', data.arrival); addRow('Décollage UTC', data.off_time); addRow('Atterrissage UTC', data.on_time); addRow('TT départ (h)', data.tt_start); addRow('TT arrivée (h)', data.tt_end); addRow('Carburant embarqué (L)', data.fuel_loaded); addRow('Carburant restant (L)', data.fuel_remaining); addRow('PAX', data.pax);
    addSection('C — ANOMALIES'); addRow('Statut', data.anomaly_status, true);
    if (data.anomaly_desc) addTextBlock('Détail anomalies :', data.anomaly_desc);
  } else if (type === 'si') {
    addSection('IDENTIFICATION'); addRow('Date UTC', data.date); addRow('Déclarant', data.anonymous==='anonyme'?'ANONYME':data.pilot_name); addRow('N° FR', data.fr_ref); addRow('Type de déclaration', data.anonymous);
    addTextBlock('DESCRIPTION DES FAITS', data.description);
    addSection('GRAVITÉ & DÉCLARATION'); addRow('Gravité', data.severity, true); addRow('ECCAIRS / BEA', data.eccairs);
    if (data.suggestions) addTextBlock('SUGGESTIONS', data.suggestions);
  } else if (type === 'nav') {
    addSection('IDENTIFICATION'); addRow('Date UTC', data.date); addRow('CDB', data.pilot_name); addRow('Départ', data.departure); addRow('Destination', data.arrival); addRow('Dégagement', data.alternate); addRow('Type nav.', data.nav_type); addRow('Niveau FL', data.fl); addRow('TAS (kts)', data.tas);
    addSection('ROUTE'); addRow('Waypoints', data.route);
    addSection('CARBURANT'); addRow('Embarqué (L)', data.fuel_loaded); addRow('Trajet (L)', data.fuel_traj); addRow('Contingence (L)', data.fuel_cont); addRow('Dégagement (L)', data.fuel_alt); addRow('Réserve 45\' (L)', data.fuel_res); addRow('Consommé réel (L)', data.fuel_actual);
    if (data.meteo_notes) addTextBlock('MÉTÉO EN ROUTE', data.meteo_notes);
  }

  // Signature block
  if (y > 240) { doc.addPage(); y = 15; }
  y += 5;
  doc.setDrawColor(11,37,89); doc.setLineWidth(0.3);
  doc.rect(M, y, W-2*M, 28);
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(11,37,89);
  doc.text('SIGNATURES', M+3, y+5);
  doc.setTextColor(0,0,0); doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text('CDB / PIC', M+5, y+12);
  doc.text(data.pilot_name||'—', M+5, y+17);
  doc.text('Signé électroniquement via HOVE OPS', M+5, y+22);
  doc.text(new Date(form?.submitted_at||Date.now()).toLocaleString('fr-FR')+' UTC', M+5, y+26);
  doc.line(W/2, y+8, W-M-5, y+8);
  doc.text('DO / Vérification (si requis)', W/2+2, y+12);
  doc.text('À compléter si dérogation', W/2+2, y+17);

  // Footer
  const pages = doc.internal.getNumberOfPages();
  for (let i=1;i<=pages;i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(150,150,150);
    doc.text(`CONFIDENTIEL — Usage interne exclusif · HOVE AVIATION EXECUTIVE · ${ref} · Page ${i}/${pages}`, W/2, 292, {align:'center'});
  }

  doc.save(`${ref}.pdf`);
}
